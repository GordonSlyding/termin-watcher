name: Doctolib Termin-Watcher

on:
  schedule:
    - cron: "0 */3 * * *"   # alle 3 Std neu anstossen (Sicherheitsnetz)
  workflow_dispatch:        # manuelles Starten ueber "Run workflow"

concurrency:
  group: doctolib-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # das Skript laeuft ~4 Std; harte Obergrenze waeren 6 Std
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install requests

      - name: Termine pruefen (ca. 4 Std, alle 5 Min, alle Aerzte)
        env:
          WATCH_CONFIG: ${{ secrets.WATCH_CONFIG }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python watcher.py
