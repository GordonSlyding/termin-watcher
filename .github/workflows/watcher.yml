name: Doctolib Termin-Watcher

on:
  schedule:
    # Stoesst die Schleife regelmaessig neu an (Sicherheitsnetz).
    # Der eigentliche 5-Minuten-Takt passiert INNERHALB des Laufs, siehe unten.
    - cron: "0 */3 * * *"   # alle 3 Stunden
  workflow_dispatch:        # manuelles Starten ueber "Run workflow"

# Sorgt dafuer, dass sich nicht mehrere Laeufe gleichzeitig ins Gehege kommen.
concurrency:
  group: doctolib-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install requests

      - name: Dauer-Check (alle 5 Min, ca. 4 Stunden lang)
        env:
          AVAILABILITIES_URL: ${{ secrets.AVAILABILITIES_URL }}
          BOOKING_URL: ${{ secrets.BOOKING_URL }}
          MY_APPOINTMENT: ${{ secrets.MY_APPOINTMENT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          for i in $(seq 1 48); do
            echo "--- Check $i von 48 ---"
            python watcher.py || true
            sleep 300
          done
